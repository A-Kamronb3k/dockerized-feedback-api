name: CI — test, scan, publish

on:
  push:
    branches: [main]
    tags: ['v*.*.*']        # tags like v1.0.0 also trigger the pipeline
  pull_request:
    branches: [main]

env:
  IMAGE_NAME: ghcr.io/a-kamronb3k/dockerized-feedback-api   # must be lowercase!

jobs:
  # ---------- Stage 1: quality gate ----------
  lint-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm test

  # ---------- Stage 2: build -> scan -> push ----------
  build-scan-push:
    needs: lint-test          # if tests fail, this job never starts
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write         # required to push to GHCR (the most commonly forgotten line!)
    steps:
      - uses: actions/checkout@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}   # automatic token — no PAT needed

      - name: Docker metadata (tags)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha
            type=semver,pattern=v{{version}}

      - name: Build image (locally, for scanning)
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: ${{ env.IMAGE_NAME }}:scan

      - name: Trivy vulnerability scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.IMAGE_NAME }}:scan
          format: table
          exit-code: '1'            # fail the pipeline on CRITICAL/HIGH findings
          severity: CRITICAL,HIGH
          ignore-unfixed: true      # don't block on CVEs with no released fix yet

      - name: Push to GHCR
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}   # never push from pull requests
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
